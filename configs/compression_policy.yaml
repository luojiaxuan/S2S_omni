version: 1
default:
  mode: concise
  max_target_wpm: 185
  preferred_target_wpm: 165
  max_end_lag_s: 1.5
  rtf_threshold: 1.0
  rtf_lag_slack_s: 0.0
  zh_char_per_sec: 5.0
  word_per_sec: 2.75
  max_compression_ratio: 0.78
  min_term_recall: 0.95
  min_number_recall: 1.0
  preserve:
    - named_entities
    - numbers
    - terminology
    - negation
    - modality
    - causality
    - contrast
  compressible:
    - discourse_fillers
    - repeated_explanations
    - redundant_modifiers
    - low_information_examples
    - self_repairs
    - politeness_padding
modes:
  faithful:
    target_ratio: 0.95
    description: "Near-complete translation; use when lag is not building."
  concise:
    target_ratio: 0.75
    description: "Interpreter-style concise translation preserving all core meaning."
  very_concise:
    target_ratio: 0.58
    description: "Aggressive compression; omit only non-critical details."
