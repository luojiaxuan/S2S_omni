num_train_epochs: 1
max_steps: -1
logging_steps: 5
save_steps: 200
save_total_limit: 3
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
