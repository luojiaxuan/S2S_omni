run_name: qwen3_omni_compression_text_lora
model_name_or_path: Qwen/Qwen3-Omni-30B-A3B-Instruct
model_backend: qwen3_omni_thinker
train_file: work/sft.jsonl
output_dir: runs/qwen3_omni_compression_text_lora
trust_remote_code: true
max_seq_length: 4096
completion_only_loss: true
device_map: auto
attn_implementation:
packing: false
gradient_checkpointing: true
bf16: true
